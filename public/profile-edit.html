<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>peers — プロフィール編集</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="stylesheet" href="/peers.css" />
  <style>
    body { background: radial-gradient(1200px 600px at 50% -10%, var(--teal-100), transparent 60%), var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: flex-start; min-height: 100vh; padding: 2rem 1rem 4rem; }
    .brand-top { margin-bottom: 1.5rem; }
    .card { max-width: 540px; }
    .form-field { margin-bottom: 1.25rem; }
  </style>
</head>
<body>
  <div class="brand-top">
    <a class="brand" href="/match.html">
      <svg class="brand-mark" width="28" height="28" viewBox="0 0 120 120" aria-hidden="true"><rect width="120" height="120" rx="26" fill="#5dc8cd"/><g transform="translate(60,62) rotate(-18)"><path d="M 0,-26 C -10,-32 -25,-32 -35,-27 L -35,24 C -25,18 -10,18 0,25 C 10,18 25,18 35,24 L 35,-27 C 25,-32 10,-32 0,-26 Z" fill="#fff"/><path d="M 0,-26 L 0,25" stroke="#5dc8cd" stroke-width="3" stroke-linecap="round"/></g></svg>
      <span class="brand-word">peers</span>
    </a>
  </div>

  <div class="card card-wide">
    <div class="page-header-row">
      <button class="back-btn" onclick="location.href='/match.html'">←</button>
      <h1>プロフィール編集</h1>
    </div>

    <div id="form-area">
      <div class="loading">
        <div class="spinner"></div>
        <p class="loading-text">プロフィールを読み込み中…</p>
      </div>
    </div>
  </div>

  <script>
    const STUDY_FIELDS = [
      "大学受験", "大学院受験", "高校受験",
      "TOEIC", "TOEFL", "英会話", "英語",
      "韓国語", "中国語", "フランス語", "スペイン語",
      "公認会計士", "税理士", "行政書士", "宅建", "簿記",
      "プログラミング", "Python", "JavaScript", "React",
      "データ分析", "機械学習", "AI",
      "Webデザイン", "動画編集", "UI/UX",
      "数学", "物理", "化学", "生物",
      "国語", "日本史", "世界史", "地理",
      "医学・看護", "法律", "経済学",
      "読書・教養", "ビジネス",
    ];

    let selectedFields = [];

    function esc(str) {
      return String(str ?? "")
        .replace(/&/g, "&amp;").replace(/</g, "&lt;")
        .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }

    function buildForm(profile) {
      selectedFields = [...(profile.studyFields || [])];

      const fieldsHtml = STUDY_FIELDS.map((f) => `
        <div class="option-chip${selectedFields.includes(f) ? " selected" : ""}"
             onclick="toggleField('${esc(f)}', this)">${esc(f)}</div>`).join("");

      document.getElementById("form-area").innerHTML = `
        <div class="form-field">
          <label>ニックネーム</label>
          <input type="text" id="nickname" value="${esc(profile.nickname || "")}" maxlength="20" placeholder="例：たろう" />
        </div>

        <div class="section-title">目標</div>
        <div class="form-field">
          <label>目指していること</label>
          <input type="text" id="goal" value="${esc(profile.goal || "")}" maxlength="100"
            placeholder="例：今年12月までにTOEIC 800点突破" />
        </div>

        <div class="section-title">勉強分野</div>
        <div class="form-field">
          <div class="options-grid" id="fields-grid">${fieldsHtml}</div>
        </div>

        <div class="section-title">プロフィール文</div>
        <div class="form-field">
          <label>仲間に見せるビジョン（公開）</label>
          <textarea id="publicBio" placeholder="目標・熱量・どんな仲間と学びたいかを自由に…">${esc(profile.publicBio || "")}</textarea>
        </div>

        <div class="form-field">
          <div class="private-badge">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4" stroke-linecap="round"/></svg>
            AIのみ・非公開
          </div>
          <label>今の正直な状況（非公開）</label>
          <div class="disclaimer">他のユーザーには一切公開されません。AIがマッチングの参考にするだけです。</div>
          <textarea id="privateReality" placeholder="今の成績・悩み・置かれた状況など、本音で書いてください…">${esc(profile.privateReality || "")}</textarea>
        </div>

        <div id="error-msg"></div>

        <div class="actions">
          <button class="btn btn-cancel" onclick="location.href='/match.html'">キャンセル</button>
          <button class="btn btn-save" id="btn-save" onclick="saveProfile()">保存してマッチ更新</button>
        </div>
      `;
    }

    function toggleField(value, el) {
      el.classList.toggle("selected");
      if (el.classList.contains("selected")) {
        selectedFields.push(value);
      } else {
        selectedFields = selectedFields.filter((f) => f !== value);
      }
    }

    async function saveProfile() {
      const nickname = document.getElementById("nickname").value.trim();
      const goal = document.getElementById("goal").value.trim();
      const publicBio = document.getElementById("publicBio").value.trim();
      const privateReality = document.getElementById("privateReality").value.trim();
      const errEl = document.getElementById("error-msg");

      if (!nickname) { errEl.textContent = "ニックネームを入力してください"; return; }
      if (!goal) { errEl.textContent = "目標を入力してください"; return; }
      if (selectedFields.length === 0) { errEl.textContent = "分野を1つ以上選択してください"; return; }
      if (publicBio.length < 20) { errEl.textContent = "ビジョンをもう少し詳しく書いてください（20文字以上）"; return; }
      if (privateReality.length < 20) { errEl.textContent = "今の状況をもう少し詳しく書いてください（20文字以上）"; return; }
      errEl.textContent = "";

      const btn = document.getElementById("btn-save");
      btn.disabled = true;
      btn.textContent = "保存中…";

      try {
        const r = await fetch("/api/profile", {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ nickname, goal, studyFields: selectedFields, publicBio, privateReality }),
        });
        if (!r.ok) {
          const d = await r.json();
          throw new Error(d.error || "保存に失敗しました");
        }
        location.href = "/match.html";
      } catch (err) {
        document.getElementById("error-msg").textContent = err.message;
        btn.disabled = false;
        btn.textContent = "保存してマッチ更新";
      }
    }

    (async () => {
      try {
        const meRes = await fetch("/api/me");
        if (!meRes.ok) { location.href = "/"; return; }
        const profRes = await fetch("/api/profile");
        if (!profRes.ok) throw new Error("プロフィール取得に失敗しました");
        const { profile } = await profRes.json();
        buildForm(profile || {});
      } catch (err) {
        document.getElementById("form-area").innerHTML =
          `<p style="color:var(--danger)">読み込みに失敗しました: ${err.message}</p>`;
      }
    })();
  </script>
</body>
</html>

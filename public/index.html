<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign in</title>
  <script src="https://accounts.google.com/gsi/client" async></script>
  <style>
    body { font-family: system-ui, sans-serif; display: grid; place-items: center;
           min-height: 100vh; margin: 0; background: #fafafa; }
    .card { text-align: center; }
    #status { margin-top: 1rem; color: #555; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Welcome</h1>
    <!-- Replace data-client_id with your real Google OAuth client ID -->
    <div id="g_id_onload"
        data-client_id="1046552519693-3n1mf8quucql9e2k2pj6ugsm04rgmldq.apps.googleusercontent.com"
        data-callback="onSignIn"></div>
    <div class="g_id_signin" data-type="standard" data-theme="filled_blue"
         data-text="continue_with" data-shape="pill"></div>
    <p id="status"></p>
  </div>

  <script>
    async function onSignIn(response) {
  const r = await fetch("/api/auth/google", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ credential: response.credential }),
  });
  const data = await r.json();
  if (r.ok) {
    // Go to match if the profile's already complete, else onboarding.
    location.href = data.user?.profile?.profileComplete
      ? "/match.html"
      : "/onboarding.html";
  } else {
    document.getElementById("status").textContent = `Error: ${data.error}`;
  }
}

  </script>
</body>
</html>

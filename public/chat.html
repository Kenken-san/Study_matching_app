<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>StudyMatch — チャット</title>
  <script src="https://accounts.google.com/gsi/client" async></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      background: #f0f2ff;
    }

    /* Header */
    .top-bar {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      background: white;
      border-bottom: 1px solid #e2e8f0;
      flex-shrink: 0;
    }
    .back-btn {
      background: none; border: none; cursor: pointer;
      font-size: 1.1rem; color: #667eea; padding: 0;
    }
    .top-bar h1 { font-size: 1rem; color: #1a1a2e; }
    .top-bar .partner-name { font-size: 1rem; font-weight: 700; color: #1a1a2e; }

    /* Layout */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      width: 240px;
      flex-shrink: 0;
      background: white;
      border-right: 1px solid #e2e8f0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-tabs {
      display: flex;
      border-bottom: 1px solid #e2e8f0;
    }
    .tab-btn {
      flex: 1;
      padding: 0.6rem;
      font-size: 0.8rem;
      font-weight: 600;
      border: none;
      background: none;
      cursor: pointer;
      color: #888;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    .tab-btn.active { color: #667eea; border-bottom-color: #667eea; }
    .sidebar-list { flex: 1; overflow-y: auto; }
    .contact-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.75rem 1rem;
      cursor: pointer;
      transition: background 0.15s;
      border-bottom: 1px solid #f5f5f5;
    }
    .contact-item:hover { background: #f8f9ff; }
    .contact-item.active { background: #eef0ff; }
    .avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem;
      font-weight: 700;
      flex-shrink: 0;
    }
    .contact-info { flex: 1; min-width: 0; }
    .contact-name { font-size: 0.875rem; font-weight: 600; color: #1a1a2e; }
    .contact-sub { font-size: 0.75rem; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .pending-item {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid #f5f5f5;
    }
    .pending-item .contact-name { font-size: 0.875rem; font-weight: 600; color: #1a1a2e; margin-bottom: 0.25rem; }
    .pending-item .contact-sub { font-size: 0.75rem; color: #888; margin-bottom: 0.5rem; }
    .accept-btn {
      width: 100%;
      padding: 0.4rem;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
    }
    .accept-btn:hover { opacity: 0.9; }

    .empty-msg { padding: 1.5rem 1rem; text-align: center; color: #aaa; font-size: 0.85rem; }

    /* Chat area */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .chat-header {
      padding: 0.75rem 1rem;
      background: white;
      border-bottom: 1px solid #e2e8f0;
      font-weight: 700;
      color: #1a1a2e;
      flex-shrink: 0;
    }
    .messages-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .no-chat {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #aaa;
      font-size: 0.9rem;
      text-align: center;
      padding: 2rem;
    }
    .bubble {
      max-width: 70%;
      padding: 0.6rem 0.9rem;
      border-radius: 16px;
      font-size: 0.875rem;
      line-height: 1.5;
      word-break: break-word;
    }
    .bubble.mine {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    .bubble.theirs {
      background: white;
      color: #333;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .bubble-time {
      font-size: 0.65rem;
      color: #aaa;
      margin-top: 2px;
      text-align: right;
    }
    .bubble.theirs + .bubble-time { text-align: left; }

    .input-bar {
      display: flex;
      gap: 0.5rem;
      padding: 0.75rem 1rem;
      background: white;
      border-top: 1px solid #e2e8f0;
      flex-shrink: 0;
    }
    .input-bar input {
      flex: 1;
      padding: 0.65rem 1rem;
      border: 2px solid #e2e8f0;
      border-radius: 20px;
      font-size: 0.9rem;
      outline: none;
      font-family: inherit;
    }
    .input-bar input:focus { border-color: #667eea; }
    .send-btn {
      padding: 0.65rem 1.1rem;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 20px;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.85rem;
    }
    .send-btn:disabled { opacity: 0.5; cursor: default; }
    .ask-gemini-btn {
      padding: 0.65rem 0.9rem;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 20px;
      font-size: 1rem;
      cursor: pointer;
      flex-shrink: 0;
    }
    .ask-gemini-btn:disabled { opacity: 0.5; cursor: default; }
    .bubble.gemini {
      background: linear-gradient(135deg, #f3f0ff, #ede8ff);
      color: #3d2c8d;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      border: 1px solid #c4b5f4;
      max-width: 85%;
      white-space: pre-wrap;
    }
    .gemini-label {
      font-size: 0.68rem;
      color: #764ba2;
      font-weight: 700;
      margin-bottom: 2px;
      align-self: flex-start;
    }

    /* Coach card */
    .coach-card {
      flex-shrink: 0;
      background: linear-gradient(135deg, #f3f0ff, #fdf5ff);
      border-left: 3px solid #667eea;
      border-bottom: 1px solid #e2e8f0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }
    .coach-card.collapsed { max-height: 42px; }
    .coach-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 1rem;
      cursor: pointer;
      user-select: none;
    }
    .coach-header-title { font-size: 0.82rem; font-weight: 700; color: #667eea; }
    .coach-toggle {
      background: none; border: none; cursor: pointer;
      font-size: 0.75rem; color: #888; padding: 0;
    }
    .coach-body { padding: 0 1rem 0.9rem; }
    .coach-compat {
      font-size: 0.85rem; color: #333; line-height: 1.6;
      margin-bottom: 0.75rem;
      font-style: italic;
    }
    .plan-title { font-size: 0.75rem; font-weight: 700; color: #667eea; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.4rem; }
    .coach-plan ol { padding-left: 1.1rem; margin-bottom: 0.75rem; }
    .coach-plan li { font-size: 0.83rem; color: #444; line-height: 1.6; margin-bottom: 0.2rem; }
    .suggest-bubble {
      background: white;
      border: 1px solid #d4c5f9;
      border-radius: 12px;
      padding: 0.6rem 0.9rem;
      font-size: 0.85rem;
      color: #333;
      line-height: 1.5;
      margin-bottom: 0.5rem;
      font-style: italic;
    }
    .use-msg-btn {
      padding: 0.45rem 1rem;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
    }
    .use-msg-btn:hover { opacity: 0.9; }
    .coach-loading { padding: 0.75rem 1rem; font-size: 0.82rem; color: #888; }

    /* Availability card */
    .avail-card {
      flex-shrink: 0;
      background: linear-gradient(135deg, #f0fff4, #f5fffb);
      border-left: 3px solid #38a169;
      border-bottom: 1px solid #e2e8f0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }
    .avail-card.collapsed { max-height: 42px; }
    .avail-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 1rem;
      cursor: pointer;
      user-select: none;
    }
    .avail-header-title { font-size: 0.82rem; font-weight: 700; color: #38a169; }
    .avail-body { padding: 0 1rem 0.9rem; }
    .best-slot {
      background: white;
      border: 1px solid #9ae6b4;
      border-radius: 10px;
      padding: 0.55rem 0.9rem;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .best-slot-label { font-size: 0.75rem; font-weight: 700; color: #276749; margin-bottom: 1px; }
    .best-slot-time { font-size: 1rem; font-weight: 700; color: #38a169; }
    .avail-windows { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 0.5rem; margin-top: 0.4rem; }
    .avail-chip {
      font-size: 0.73rem;
      padding: 3px 10px;
      background: #e6ffed;
      border: 1px solid #9ae6b4;
      border-radius: 20px;
      color: #276749;
      font-weight: 600;
    }
    .avail-no-data { font-size: 0.82rem; color: #777; line-height: 1.7; }
    .avail-privacy { font-size: 0.68rem; color: #bbb; margin-top: 0.5rem; }
    .cal-connect-btn {
      padding: 0.45rem 1rem;
      background: #38a169;
      color: white;
      border: none;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
    }
    .cal-connect-btn:hover { background: #2f855a; }
    .cal-connect-btn:disabled { opacity: 0.6; cursor: default; }

    @media (max-width: 560px) {
      .sidebar { width: 100%; display: none; }
      .sidebar.show { display: flex; position: fixed; inset: 0; z-index: 10; }
      .chat-area { display: flex; }
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <button class="back-btn" onclick="location.href='/match.html'">←</button>
    <h1>💬 チャット</h1>
  </div>

  <div class="layout">
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-tabs">
        <button class="tab-btn active" id="tab-conn" onclick="switchTab('connections')">接続中</button>
        <button class="tab-btn" id="tab-pend" onclick="switchTab('pending')">
          申請 <span id="pend-count"></span>
        </button>
      </div>
      <div class="sidebar-list" id="sidebar-list">
        <div class="empty-msg">読み込み中...</div>
      </div>
    </div>

    <!-- Chat area -->
    <div class="chat-area">
      <div id="chat-body" class="no-chat">
        <div>
          <div style="font-size:2rem;margin-bottom:0.5rem">💬</div>
          <div>左の一覧から相手を選んでください</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let myId = null;
    let googleClientId = null;
    let currentTab = "connections";
    let currentPartnerId = null;
    let pollTimer = null;
    let connections = [];
    let pending = [];
    let localGeminiMessages = []; // { partnerId, text, createdAt } — 自分だけに見える

    const DAYS_JA = ["月", "火", "水", "木", "金", "土", "日"];

    function nextDateForDay(ourDay) {
      const today = new Date();
      const todayJs = today.getDay();          // 0=日〜6=土
      const targetJs = (ourDay + 1) % 7;      // 0=月→1, 6=日→0
      const diff = (targetJs - todayJs + 7) % 7;
      const d = new Date(today);
      d.setDate(today.getDate() + diff);
      return d;
    }

    function dateLabel(ourDay) {
      const d = nextDateForDay(ourDay);
      return `${d.getMonth() + 1}/${d.getDate()}(${DAYS_JA[ourDay]})`;
    }

    function esc(str) {
      return String(str ?? "")
        .replace(/&/g, "&amp;").replace(/</g, "&lt;")
        .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }

    function fmtTime(ts) {
      return new Date(ts).toLocaleTimeString("ja-JP", { hour: "2-digit", minute: "2-digit" });
    }

    function avatarLetter(name) {
      return esc(String(name || "?")[0].toUpperCase());
    }

    // --- Sidebar -------------------------------------------------------------

    function switchTab(tab) {
      currentTab = tab;
      document.getElementById("tab-conn").classList.toggle("active", tab === "connections");
      document.getElementById("tab-pend").classList.toggle("active", tab === "pending");
      renderSidebar();
    }

    function renderSidebar() {
      const list = document.getElementById("sidebar-list");
      if (currentTab === "connections") {
        if (!connections.length) {
          list.innerHTML = '<div class="empty-msg">まだ繋がっている人がいません。<br>マッチング画面から「つながる」を押してみよう！</div>';
          return;
        }
        list.innerHTML = connections.map((c) => `
          <div class="contact-item${currentPartnerId === c.partnerId ? " active" : ""}"
               onclick="openChat('${c.partnerId}', '${esc(c.nickname)}')">
            <div class="avatar">${avatarLetter(c.nickname)}</div>
            <div class="contact-info">
              <div class="contact-name">${esc(c.nickname)}</div>
              <div class="contact-sub">${esc(c.affiliation)}</div>
            </div>
          </div>`).join("");
      } else {
        if (!pending.length) {
          list.innerHTML = '<div class="empty-msg">受信中の申請はありません</div>';
          return;
        }
        list.innerHTML = pending.map((p) => `
          <div class="pending-item">
            <div class="contact-name">${esc(p.nickname)}</div>
            <div class="contact-sub">${esc(p.affiliation)}</div>
            <button class="accept-btn" onclick="acceptReq('${p.fromId}', this)">✅ 承認する</button>
          </div>`).join("");
      }
    }

    async function acceptReq(fromId, btn) {
      btn.disabled = true;
      btn.textContent = "承認中...";
      const r = await fetch(`/api/connect/${fromId}/accept`, { method: "PUT" });
      if (r.ok) {
        await loadSidebarData();
        switchTab("connections");
      } else {
        btn.disabled = false;
        btn.textContent = "✅ 承認する";
      }
    }

    async function loadSidebarData() {
      const [cr, pr] = await Promise.all([
        fetch("/api/connections"),
        fetch("/api/connections/pending"),
      ]);
      const cd = await cr.json();
      const pd = await pr.json();
      connections = cd.connections || [];
      pending = pd.pending || [];

      const countEl = document.getElementById("pend-count");
      countEl.textContent = pending.length ? `(${pending.length})` : "";

      renderSidebar();
    }

    // --- Chat ----------------------------------------------------------------

    function openChat(partnerId, partnerName) {
      currentPartnerId = partnerId;
      renderSidebar();

      const chatBody = document.getElementById("chat-body");
      chatBody.className = "";
      chatBody.innerHTML = `
        <div class="chat-header">${esc(partnerName)}</div>
        <div class="coach-card" id="coach-card">
          <div class="coach-header" onclick="toggleCoach()">
            <span class="coach-header-title">🤖 Geminiからのスタディプラン</span>
            <button class="coach-toggle" id="coach-toggle-btn">▲ 閉じる</button>
          </div>
          <div class="coach-body" id="coach-body">
            <div class="coach-loading">Geminiがプランを生成中...</div>
          </div>
        </div>
        <div class="avail-card" id="avail-card">
          <div class="avail-header" onclick="toggleAvail()">
            <span class="avail-header-title">📅 空き時間マッチ</span>
            <button class="coach-toggle" id="avail-toggle-btn">▲ 閉じる</button>
          </div>
          <div class="avail-body" id="avail-body">
            <div class="coach-loading">空き時間を計算中...</div>
          </div>
        </div>
        <div class="messages-wrap" id="messages-wrap">
          <div style="text-align:center;color:#aaa;font-size:0.8rem;padding:1rem">読み込み中...</div>
        </div>
        <div class="input-bar">
          <input type="text" id="msg-input" placeholder="メッセージ入力… / 🤖で質問"
            onkeydown="if(event.key==='Enter')sendMsg()" />
          <button class="ask-gemini-btn" id="ask-gemini-btn" onclick="askGemini()" title="Geminiに質問する">🤖</button>
          <button class="send-btn" id="send-btn" onclick="sendMsg()">送信</button>
        </div>`;

      history.replaceState(null, "", `/chat.html?with=${partnerId}`);

      // Restore coach collapsed state
      const coachCollapsed = localStorage.getItem(`coach-collapsed-${partnerId}`) === "1";
      if (coachCollapsed) {
        document.getElementById("coach-card").classList.add("collapsed");
        document.getElementById("coach-toggle-btn").textContent = "▼ 開く";
      }

      // Restore avail collapsed state
      const availCollapsed = localStorage.getItem(`avail-collapsed-${partnerId}`) === "1";
      if (availCollapsed) {
        document.getElementById("avail-card").classList.add("collapsed");
        document.getElementById("avail-toggle-btn").textContent = "▼ 開く";
      }

      if (pollTimer) clearInterval(pollTimer);
      fetchMessages();
      pollTimer = setInterval(fetchMessages, 3000);

      loadCoach(partnerId);
      loadAvailability(partnerId);
    }

    function toggleCoach() {
      const card = document.getElementById("coach-card");
      const btn = document.getElementById("coach-toggle-btn");
      if (!card) return;
      const collapsed = card.classList.toggle("collapsed");
      btn.textContent = collapsed ? "▼ 開く" : "▲ 閉じる";
      if (currentPartnerId) {
        localStorage.setItem(`coach-collapsed-${currentPartnerId}`, collapsed ? "1" : "0");
      }
    }

    function useMessage(text) {
      const input = document.getElementById("msg-input");
      if (input) { input.value = text; input.focus(); }
    }

    async function loadCoach(partnerId) {
      try {
        const r = await fetch(`/api/coach/${partnerId}`, { method: "POST" });
        const data = await r.json();
        const body = document.getElementById("coach-body");
        if (!body) return;
        if (!r.ok) {
          body.innerHTML = `<div class="coach-loading" style="color:#e53e3e">${esc(data.error || "生成に失敗しました")}</div>`;
          return;
        }
        const planItems = (data.plan || []).map((p) => `<li>${esc(p)}</li>`).join("");
        const msgEscaped = esc(data.firstMessage || "");
        body.innerHTML = `
          <p class="coach-compat">${esc(data.compatibility || "")}</p>
          <div class="coach-plan">
            <div class="plan-title">おすすめの進め方</div>
            <ol>${planItems}</ol>
          </div>
          <div class="coach-msg-suggest">
            <div class="plan-title">最初に送るとよいメッセージ</div>
            <div class="suggest-bubble">「${msgEscaped}」</div>
            <button class="use-msg-btn" onclick="useMessage('${msgEscaped.replace(/'/g, "\\'")}')">このメッセージを使う ✍️</button>
          </div>`;
      } catch {
        const body = document.getElementById("coach-body");
        if (body) body.innerHTML = `<div class="coach-loading" style="color:#e53e3e">読み込みに失敗しました</div>`;
      }
    }

    async function fetchConfig() {
      try {
        const r = await fetch("/api/config");
        const d = await r.json();
        googleClientId = d.googleClientId;
      } catch {}
    }

    function connectCalendar() {
      if (!googleClientId || typeof google === "undefined") return;
      const tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: googleClientId,
        scope: "https://www.googleapis.com/auth/calendar.readonly",
        callback: async (tokenResponse) => {
          if (!tokenResponse.access_token) return;
          const btn = document.getElementById("cal-connect-btn");
          if (btn) { btn.disabled = true; btn.textContent = "連携中..."; }
          try {
            const r = await fetch("/api/calendar/connect", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                accessToken: tokenResponse.access_token,
                timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone,
              }),
            });
            if (r.ok && currentPartnerId) loadAvailability(currentPartnerId);
          } catch {
            if (btn) { btn.disabled = false; btn.textContent = "📅 Googleカレンダーを連携する"; }
          }
        },
      });
      tokenClient.requestAccessToken();
    }

    function toggleAvail() {
      const card = document.getElementById("avail-card");
      const btn = document.getElementById("avail-toggle-btn");
      if (!card) return;
      const collapsed = card.classList.toggle("collapsed");
      btn.textContent = collapsed ? "▼ 開く" : "▲ 閉じる";
      if (currentPartnerId) {
        localStorage.setItem(`avail-collapsed-${currentPartnerId}`, collapsed ? "1" : "0");
      }
    }

    async function loadAvailability(partnerId) {
      try {
        const r = await fetch("/api/availability", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ targetId: partnerId }),
        });
        const data = await r.json();
        const body = document.getElementById("avail-body");
        if (!body) return;
        if (!r.ok) {
          body.innerHTML = `<div class="avail-no-data" style="color:#e53e3e">${esc(data.error || "取得に失敗しました")}</div>`;
          return;
        }
        if (!data.hasData) {
          body.innerHTML = `
            <div class="avail-no-data">
              相手のカレンダーデータがまだ取得できていません。
            </div>
            <div style="margin-top:0.5rem">
              <button id="cal-connect-btn" class="cal-connect-btn" onclick="connectCalendar()">
                📅 Googleカレンダーを連携する
              </button>
            </div>
            <div class="avail-privacy">${esc(data.privacyNote)}</div>`;
          return;
        }
        let html = "";
        if (data.bestSlot) {
          html += `
            <div class="best-slot">
              <span style="font-size:1.1rem">⭐</span>
              <div>
                <div class="best-slot-label">おすすめの勉強時間</div>
                <div class="best-slot-time">${dateLabel(data.bestSlot.day)} ${esc(data.bestSlot.start)}〜${esc(data.bestSlot.end)}</div>
              </div>
            </div>`;
        }
        if (data.windows?.length) {
          html += `
            <div class="plan-title">二人とも空いている時間</div>
            <div class="avail-windows">
              ${data.windows.map((w) => `<span class="avail-chip">${dateLabel(w.day)} ${esc(w.start)}〜${esc(w.end)}</span>`).join("")}
            </div>`;
        }
        if (!data.myHasData) {
          html += `
            <div style="margin-top:0.5rem">
              <button id="cal-connect-btn" class="cal-connect-btn" onclick="connectCalendar()">
                📅 Googleカレンダーを連携する
              </button>
            </div>`;
        }
        html += `<div class="avail-privacy">${esc(data.privacyNote)}</div>`;
        body.innerHTML = html;
      } catch {
        const body = document.getElementById("avail-body");
        if (body) body.innerHTML = `<div class="avail-no-data" style="color:#e53e3e">読み込みに失敗しました</div>`;
      }
    }

    async function askGemini() {
      const input = document.getElementById("msg-input");
      const btn = document.getElementById("ask-gemini-btn");
      if (!input || !currentPartnerId) return;
      const question = input.value.trim();
      if (!question) return;

      input.value = "";
      btn.disabled = true;
      btn.textContent = "⏳";
      try {
        const r = await fetch(`/api/ask-gemini/${currentPartnerId}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question }),
        });
        const data = await r.json();
        if (data.text) {
          localGeminiMessages.push({
            partnerId: currentPartnerId,
            text: data.text,
            createdAt: Date.now(),
          });
        }
        await fetchMessages();
      } catch {
        input.value = question;
      } finally {
        btn.disabled = false;
        btn.textContent = "🤖";
        input.focus();
      }
    }

    async function fetchMessages() {
      if (!currentPartnerId) return;
      try {
        const r = await fetch(`/api/messages/${currentPartnerId}`);
        if (!r.ok) return;
        const { messages } = await r.json();
        renderMessages(messages);
      } catch {}
    }

    function renderMessages(msgs) {
      const wrap = document.getElementById("messages-wrap");
      if (!wrap) return;
      const atBottom = wrap.scrollHeight - wrap.scrollTop - wrap.clientHeight < 60;

      if (!msgs.length) {
        wrap.innerHTML = '<div style="text-align:center;color:#aaa;font-size:0.85rem;padding:2rem">まだメッセージがありません。最初の一言を送ってみよう！</div>';
        return;
      }

      // ローカルのGeminiメッセージ（自分だけ見える）とマージして時系列ソート
      const localForChat = localGeminiMessages
        .filter((m) => m.partnerId === currentPartnerId)
        .map((m) => ({ fromId: "gemini", text: m.text, createdAt: m.createdAt }));
      const all = [...msgs, ...localForChat].sort((a, b) => a.createdAt - b.createdAt);

      wrap.innerHTML = all.map((m) => {
        if (m.fromId === "gemini") {
          return `<div>
            <div class="gemini-label">🤖 Gemini（あなただけに表示）</div>
            <div class="bubble gemini">${esc(m.text)}</div>
            <div class="bubble-time" style="text-align:left">${fmtTime(m.createdAt)}</div>
          </div>`;
        }
        const isMine = m.fromId === myId;
        return `<div>
          <div class="bubble ${isMine ? "mine" : "theirs"}">${esc(m.text)}</div>
          <div class="bubble-time" style="${isMine ? "text-align:right" : "text-align:left"}">${fmtTime(m.createdAt)}</div>
        </div>`;
      }).join("");

      if (atBottom) wrap.scrollTop = wrap.scrollHeight;
    }

    async function sendMsg() {
      const input = document.getElementById("msg-input");
      const btn = document.getElementById("send-btn");
      if (!input || !currentPartnerId) return;
      const text = input.value.trim();
      if (!text) return;

      input.value = "";
      btn.disabled = true;
      try {
        await fetch(`/api/messages/${currentPartnerId}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text }),
        });
        await fetchMessages();
      } finally {
        btn.disabled = false;
        input.focus();
      }
    }

    // --- Init ----------------------------------------------------------------

    (async () => {
      try {
        const meRes = await fetch("/api/me");
        if (!meRes.ok) { location.href = "/"; return; }
        const { user } = await meRes.json();
        myId = user.id;

        await Promise.all([fetchConfig(), loadSidebarData()]);

        // Auto-open from URL param ?with=
        const params = new URLSearchParams(location.search);
        const withId = params.get("with");
        if (withId) {
          const conn = connections.find((c) => c.partnerId === withId);
          if (conn) openChat(conn.partnerId, conn.nickname);
        }
      } catch {
        location.href = "/";
      }
    })();
  </script>
</body>
</html>

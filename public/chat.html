<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>peers — チャット</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <script src="https://accounts.google.com/gsi/client" async></script>
  <link rel="stylesheet" href="/peers.css" />
  <style>
    body { background: var(--bg); height: 100vh; overflow: hidden; }

    /* Top bar */
    .top-bar {
      display: flex; align-items: center; gap: 0.6rem; height: 56px;
      padding: 0 1rem; background: rgba(255,255,255,0.88);
      backdrop-filter: blur(16px); border-bottom: 1px solid var(--line);
    }
    .top-bar h1 { font-family: var(--font-display); font-size: 1.05rem; font-weight: 700; color: var(--ink); }

    /* Layout */
    .layout { display: flex; height: calc(100vh - 56px); }

    /* Sidebar */
    .sidebar {
      width: 300px; flex-shrink: 0; border-right: 1px solid var(--line);
      background: var(--surface); display: flex; flex-direction: column;
    }
    .sidebar-tabs { display: flex; border-bottom: 1px solid var(--line); }
    .tab-btn {
      flex: 1; padding: 0.8rem 0.4rem; background: none; border: none; cursor: pointer;
      font-family: inherit; font-size: 0.8rem; font-weight: 600; color: var(--muted);
      border-bottom: 2px solid transparent; transition: all 0.15s;
    }
    .tab-btn:hover { color: var(--teal-700); }
    .tab-btn.active { color: var(--teal-700); border-bottom-color: var(--teal); }
    .sidebar-list { flex: 1; overflow-y: auto; }

    .contact-item {
      display: flex; align-items: center; gap: 0.7rem; padding: 0.8rem 1rem;
      cursor: pointer; transition: background 0.12s; border-bottom: 1px solid var(--bg);
    }
    .contact-item:hover { background: var(--teal-50); }
    .contact-item.active { background: var(--teal-50); box-shadow: inset 3px 0 0 var(--teal); }
    .avatar {
      width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
      background: var(--teal); color: #fff; display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display); font-weight: 700; font-size: 1rem;
    }
    .avatar.group-avatar { background: var(--teal-700); border-radius: var(--r-md); }
    .contact-info { min-width: 0; flex: 1; }
    .contact-name { font-size: 0.875rem; font-weight: 600; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .contact-sub { font-size: 0.72rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .pending-item { padding: 0.8rem 1rem; border-bottom: 1px solid var(--bg); }
    .pending-item .contact-name { font-size: 0.875rem; font-weight: 600; color: var(--ink); margin-bottom: 0.2rem; }
    .pending-item .contact-sub { font-size: 0.72rem; color: var(--muted); margin-bottom: 0.5rem; }
    .accept-btn {
      padding: 0.4rem 0.9rem; background: var(--teal); color: #fff; border: none;
      border-radius: var(--r-sm); font-family: inherit; font-size: 0.78rem; font-weight: 600; cursor: pointer;
    }
    .accept-btn:hover { background: var(--teal-600); }
    .empty-msg { padding: 1.5rem 1rem; text-align: center; color: var(--muted); font-size: 0.85rem; line-height: 1.6; }

    /* Group sidebar controls */
    .create-group-btn {
      margin: 0.8rem 1rem; padding: 0.7rem; background: var(--teal); color: #fff;
      border: none; border-radius: var(--r-md); font-family: inherit; font-weight: 600;
      font-size: 0.85rem; cursor: pointer; width: calc(100% - 2rem);
    }
    .create-group-btn:hover { background: var(--teal-600); }
    .group-form { margin: 0 1rem 0.8rem; padding: 1rem; background: var(--teal-50); border-radius: var(--r-md); }
    .group-form input, .group-form textarea {
      width: 100%; padding: 0.6rem 0.8rem; margin-bottom: 0.5rem;
      border: 1.5px solid var(--line); border-radius: var(--r-sm); font-family: inherit; font-size: 0.85rem; outline: none;
    }
    .group-form input:focus, .group-form textarea:focus { border-color: var(--teal); }
    .group-form-btns { display: flex; gap: 0.5rem; }
    .group-form-btns button {
      flex: 1; padding: 0.55rem; border: none; border-radius: var(--r-sm);
      font-family: inherit; font-size: 0.8rem; font-weight: 600; cursor: pointer;
    }
    .btn-submit-form { background: var(--teal); color: #fff; }
    .btn-submit-form:hover { background: var(--teal-600); }
    .btn-cancel-form { background: var(--teal-100); color: var(--ink-soft); }

    /* Chat area */
    .chat-area { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--bg); }
    .chat-header {
      padding: 0.9rem 1.25rem; background: var(--surface); border-bottom: 1px solid var(--line);
    }
    .chat-header .contact-name { font-family: var(--font-display); font-size: 1rem; }
    .chat-header-sub { font-size: 0.74rem; color: var(--muted); margin-top: 0.1rem; }

    .join-banner {
      display: flex; align-items: center; justify-content: space-between; gap: 1rem;
      padding: 0.7rem 1.25rem; background: var(--teal-50); border-bottom: 1px solid var(--teal-100);
    }
    .join-banner-text { font-size: 0.8rem; color: var(--teal-800); }
    .join-btn {
      padding: 0.45rem 1rem; background: var(--teal); color: #fff; border: none;
      border-radius: var(--r-sm); font-family: inherit; font-size: 0.8rem; font-weight: 600; cursor: pointer;
    }
    .join-btn:hover { background: var(--teal-600); }

    /* Coach card */
    .coach-card {
      flex-shrink: 0; background: linear-gradient(135deg, var(--teal-50), #f0fafb);
      border-left: 3px solid var(--teal); border-bottom: 1px solid var(--line);
      overflow: hidden; transition: max-height 0.3s ease;
    }
    .coach-card.collapsed { max-height: 42px; }
    .coach-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.6rem 1rem; cursor: pointer; user-select: none;
    }
    .coach-header-title { font-size: 0.82rem; font-weight: 700; color: var(--teal-700); }
    .coach-toggle { background: none; border: none; cursor: pointer; font-size: 0.75rem; color: var(--muted); padding: 0; }
    .coach-body { padding: 0 1rem 0.9rem; }
    .coach-compat { font-size: 0.85rem; color: var(--ink-soft); line-height: 1.6; margin-bottom: 0.75rem; font-style: italic; }
    .plan-title { font-size: 0.75rem; font-weight: 700; color: var(--teal-700); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.4rem; }
    .coach-plan ol { padding-left: 1.1rem; margin-bottom: 0.75rem; }
    .coach-plan li { font-size: 0.83rem; color: var(--ink-soft); line-height: 1.6; margin-bottom: 0.2rem; }
    .suggest-bubble {
      background: var(--surface); border: 1px solid var(--teal-100); border-radius: var(--r-md);
      padding: 0.6rem 0.9rem; font-size: 0.85rem; color: var(--ink-soft); line-height: 1.5;
      margin-bottom: 0.5rem; font-style: italic;
    }
    .use-msg-btn {
      padding: 0.45rem 1rem; background: var(--teal); color: #fff; border: none;
      border-radius: var(--r-pill); font-size: 0.8rem; font-weight: 600; cursor: pointer;
    }
    .use-msg-btn:hover { background: var(--teal-600); }
    .coach-loading { padding: 0.75rem 1rem; font-size: 0.82rem; color: var(--muted); }

    /* Availability card */
    .avail-card {
      flex-shrink: 0; background: linear-gradient(135deg, var(--teal-50), #f0fafb);
      border-left: 3px solid var(--teal-600); border-bottom: 1px solid var(--line);
      overflow: hidden; transition: max-height 0.3s ease;
    }
    .avail-card.collapsed { max-height: 42px; }
    .avail-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.6rem 1rem; cursor: pointer; user-select: none;
    }
    .avail-header-title { font-size: 0.82rem; font-weight: 700; color: var(--teal-700); }
    .avail-body { padding: 0 1rem 0.9rem; }
    .best-slot {
      background: var(--surface); border: 1px solid var(--teal-200); border-radius: var(--r-md);
      padding: 0.55rem 0.9rem; margin-bottom: 0.75rem; display: flex; align-items: center; gap: 0.5rem;
    }
    .best-slot-label { font-size: 0.75rem; font-weight: 700; color: var(--teal-800); margin-bottom: 1px; }
    .best-slot-time { font-size: 1rem; font-weight: 700; color: var(--teal-700); }
    .avail-windows { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 0.5rem; margin-top: 0.4rem; }
    .avail-chip {
      font-size: 0.73rem; padding: 3px 10px; background: var(--teal-50);
      border: 1px solid var(--teal-200); border-radius: var(--r-pill); color: var(--teal-800); font-weight: 600;
    }
    .avail-no-data { font-size: 0.82rem; color: var(--muted); line-height: 1.7; }
    .avail-privacy { font-size: 0.68rem; color: var(--muted); margin-top: 0.5rem; }
    .cal-connect-btn {
      padding: 0.45rem 1rem; background: var(--teal); color: #fff; border: none;
      border-radius: var(--r-pill); font-size: 0.8rem; font-weight: 600; cursor: pointer;
    }
    .cal-connect-btn:hover { background: var(--teal-600); }
    .cal-connect-btn:disabled { opacity: 0.6; cursor: default; }

    /* Messages */
    .messages-wrap {
      flex: 1; overflow-y: auto; padding: 1.25rem;
      display: flex; flex-direction: column; gap: 0.6rem;
    }
    .bubble {
      max-width: 70%; padding: 0.65rem 0.95rem; border-radius: 16px;
      font-size: 0.9rem; line-height: 1.5; word-wrap: break-word;
    }
    .bubble.mine { align-self: flex-end; background: var(--teal); color: #fff; border-bottom-right-radius: 5px; }
    .bubble.theirs { align-self: flex-start; background: var(--surface); color: var(--ink); border: 1px solid var(--line); border-bottom-left-radius: 5px; }
    .bubble-sender { font-size: 0.7rem; font-weight: 700; color: var(--teal-700); margin-bottom: 0.2rem; }
    .bubble-time { font-size: 0.62rem; opacity: 0.7; margin-top: 0.25rem; text-align: right; }

    .no-chat {
      flex: 1; display: flex; align-items: center; justify-content: center;
      text-align: center; color: var(--muted); font-size: 0.9rem; line-height: 1.7; padding: 2rem;
    }

    .input-bar {
      display: flex; gap: 0.6rem; padding: 0.9rem 1.25rem;
      background: var(--surface); border-top: 1px solid var(--line);
    }
    .input-bar input {
      flex: 1; padding: 0.7rem 1rem; border: 1.5px solid var(--line);
      border-radius: var(--r-pill); font-family: inherit; font-size: 0.9rem; outline: none;
      transition: border-color 0.15s;
    }
    .input-bar input:focus { border-color: var(--teal); }
    .send-btn {
      padding: 0.7rem 1.4rem; background: var(--teal); color: #fff; border: none;
      border-radius: var(--r-pill); font-family: inherit; font-size: 0.9rem; font-weight: 600;
      cursor: pointer; transition: background 0.15s;
    }
    .send-btn:hover { background: var(--teal-600); }
    .send-btn:disabled { opacity: 0.5; cursor: default; }

    @media (max-width: 640px) {
      .sidebar { position: absolute; z-index: 10; height: calc(100vh - 56px); transform: translateX(-100%); transition: transform 0.2s; }
      .sidebar.show { transform: translateX(0); }
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <button class="back-btn" onclick="location.href='/match.html'">←</button>
    <a class="logo" href="/match.html" style="text-decoration:none">
      <svg width="22" height="22" viewBox="0 0 120 120" aria-hidden="true"><rect width="120" height="120" rx="26" fill="#5dc8cd"/><g transform="translate(60,62) rotate(-18)"><path d="M 0,-26 C -10,-32 -25,-32 -35,-27 L -35,24 C -25,18 -10,18 0,25 C 10,18 25,18 35,24 L 35,-27 C 25,-32 10,-32 0,-26 Z" fill="#fff"/><path d="M 0,-26 L 0,25" stroke="#5dc8cd" stroke-width="3" stroke-linecap="round"/></g></svg>
    </a>
    <h1>チャット</h1>
  </div>

  <div class="layout">
    <div class="sidebar" id="sidebar">
      <div class="sidebar-tabs">
        <button class="tab-btn active" id="tab-conn" onclick="switchTab('connections')">つながった人</button>
        <button class="tab-btn" id="tab-pend" onclick="switchTab('pending')">
          申請<span id="pend-count"></span>
        </button>
        <button class="tab-btn" id="tab-grp" onclick="switchTab('groups')">グループ</button>
      </div>
      <div class="sidebar-list" id="sidebar-list">
        <div class="empty-msg">読み込み中…</div>
      </div>
    </div>

    <div class="chat-area">
      <div id="chat-body" class="no-chat">
        <div>
          <div style="font-size:2rem;margin-bottom:0.5rem">💬</div>
          <div>左側から相手またはグループを選んでください。</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let myId = null;
    let googleClientId = null;
    let currentTab = "connections";
    let currentPartnerId = null;
    let currentGroupId = null;
    let pollTimer = null;
    let connections = [];
    let pending = [];
    let groups = [];
    let memberGroups = new Set();
    let showingGroupForm = false;

    function esc(str) {
      return String(str ?? "")
        .replace(/&/g, "&amp;").replace(/</g, "&lt;")
        .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }

    function fmtTime(ts) {
      return new Date(ts).toLocaleTimeString("ja-JP", { hour: "2-digit", minute: "2-digit" });
    }

    function avatarLetter(name) {
      return esc(String(name || "?")[0].toUpperCase());
    }

    function nextDateForDay(ourDay) {
      const today = new Date();
      const todayJs = today.getDay();
      const targetJs = (ourDay + 1) % 7;
      const diff = (targetJs - todayJs + 7) % 7;
      const d = new Date(today);
      d.setDate(today.getDate() + diff);
      return d;
    }

    function dateLabel(ourDay) {
      const DAYS = ["月","火","水","木","金","土","日"];
      const d = nextDateForDay(ourDay);
      return `${d.getMonth() + 1}/${d.getDate()}(${DAYS[ourDay]})`;
    }

    // ── Tabs ─────────────────────────────────────────────────────────────

    function switchTab(tab) {
      currentTab = tab;
      currentPartnerId = null;
      currentGroupId = null;
      if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
      document.getElementById("tab-conn").classList.toggle("active", tab === "connections");
      document.getElementById("tab-pend").classList.toggle("active", tab === "pending");
      document.getElementById("tab-grp").classList.toggle("active", tab === "groups");
      showingGroupForm = false;
      renderSidebar();
      document.getElementById("chat-body").className = "no-chat";
      document.getElementById("chat-body").innerHTML = `
        <div>
          <div style="font-size:2rem;margin-bottom:0.5rem">💬</div>
          <div>左のリストから選んでください。</div>
        </div>`;
    }

    function renderSidebar() {
      const list = document.getElementById("sidebar-list");

      if (currentTab === "connections") {
        if (!connections.length) {
          list.innerHTML = '<div class="empty-msg">まだつながっている人がいません。<br>マッチ画面に移動して「つながる」をタップしましょう！</div>';
          return;
        }
        list.innerHTML = connections.map((c) => `
          <div class="contact-item${currentPartnerId === c.partnerId ? " active" : ""}"
               onclick="openChat('${esc(c.partnerId)}', '${esc(c.nickname)}')">
            <div class="avatar">${avatarLetter(c.nickname)}</div>
            <div class="contact-info">
              <div class="contact-name">${esc(c.nickname)}</div>
              <div class="contact-sub">${esc((c.studyFields||[]).join(" · ") || c.goal || "")}</div>
            </div>
          </div>`).join("");

      } else if (currentTab === "pending") {
        if (!pending.length) {
          list.innerHTML = '<div class="empty-msg">申請はありません</div>';
          return;
        }
        list.innerHTML = pending.map((p) => `
          <div class="pending-item">
            <div class="contact-name">${esc(p.nickname)}</div>
            <div class="contact-sub">${esc((p.studyFields||[]).join(" · ") || "")}</div>
            <button class="accept-btn" onclick="acceptReq('${esc(p.fromId)}', this)">承認</button>
          </div>`).join("");

      } else {
        renderGroupsSidebar(list);
      }
    }

    function renderGroupsSidebar(list) {
      let html = `<button class="create-group-btn" onclick="toggleGroupForm()">+ グループを作る</button>`;

      if (showingGroupForm) {
        html += `<div class="group-form" id="group-form">
          <input type="text" id="gf-name" placeholder="グループ名" maxlength="40" />
          <textarea id="gf-desc" placeholder="説明（任意）" maxlength="200"></textarea>
          <input type="text" id="gf-tags" placeholder="タグ（カンマ区切り：TOEIC, 英語など）" />
          <div class="group-form-btns">
            <button class="btn-cancel-form" onclick="toggleGroupForm()">キャンセル</button>
            <button class="btn-submit-form" onclick="createGroup()">作成</button>
          </div>
        </div>`;
      }

      if (!groups.length) {
        html += '<div class="empty-msg">グループはまだありません</div>';
      } else {
        html += groups.map((g) => {
          const isMember = memberGroups.has(g.id);
          const memberCount = (g.members || []).length;
          return `<div class="contact-item${currentGroupId === g.id ? " active" : ""}"
                       onclick="openGroupChat('${esc(g.id)}', '${esc(g.name)}', ${isMember})">
            <div class="avatar group-avatar">${avatarLetter(g.name)}</div>
            <div class="contact-info">
              <div class="contact-name">${esc(g.name)}</div>
              <div class="contact-sub">${memberCount}人${isMember ? " · 参加中" : ""}</div>
            </div>
          </div>`;
        }).join("");
      }

      list.innerHTML = html;
    }

    function toggleGroupForm() {
      showingGroupForm = !showingGroupForm;
      renderSidebar();
      if (showingGroupForm) {
        setTimeout(() => document.getElementById("gf-name")?.focus(), 50);
      }
    }

    async function createGroup() {
      const name = document.getElementById("gf-name")?.value.trim();
      const desc = document.getElementById("gf-desc")?.value.trim();
      const tagsRaw = document.getElementById("gf-tags")?.value.trim();
      if (!name) { alert("グループ名を入力してください。"); return; }
      const tags = tagsRaw ? tagsRaw.split(",").map((t) => t.trim()).filter(Boolean) : [];
      try {
        const r = await fetch("/api/groups", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, description: desc, tags }),
        });
        if (!r.ok) throw new Error((await r.json()).error || "作成に失敗しました");
        showingGroupForm = false;
        await loadGroupsData();
        renderSidebar();
      } catch (e) { alert(e.message); }
    }

    // ── Data loading ─────────────────────────────────────────────────────

    async function loadSidebarData() {
      const [cr, pr] = await Promise.all([
        fetch("/api/connections"),
        fetch("/api/connections/pending"),
      ]);
      const cd = await cr.json();
      const pd = await pr.json();
      connections = cd.connections || [];
      pending = pd.pending || [];

      const countEl = document.getElementById("pend-count");
      countEl.textContent = pending.length ? `(${pending.length})` : "";
      renderSidebar();
    }

    async function loadGroupsData() {
      try {
        const r = await fetch("/api/groups");
        if (!r.ok) return;
        const { groups: gs } = await r.json();
        groups = gs || [];
        memberGroups = new Set(groups.filter((g) => (g.members || []).includes(myId)).map((g) => g.id));
      } catch {}
    }

    async function acceptReq(fromId, btn) {
      btn.disabled = true;
      btn.textContent = "承認中…";
      const r = await fetch(`/api/connect/${fromId}/accept`, { method: "PUT" });
      if (r.ok) {
        await loadSidebarData();
        switchTab("connections");
      } else {
        btn.disabled = false;
        btn.textContent = "承認";
      }
    }

    // ── DM Chat ──────────────────────────────────────────────────────────

    function openChat(partnerId, partnerName) {
      currentPartnerId = partnerId;
      currentGroupId = null;
      renderSidebar();

      const chatBody = document.getElementById("chat-body");
      chatBody.className = "";
      chatBody.innerHTML = `
        <div class="chat-header">
          <div class="contact-name">${esc(partnerName)}</div>
        </div>
        <div class="coach-card" id="coach-card">
          <div class="coach-header" onclick="toggleCoach()">
            <span class="coach-header-title">Gemini 学習プラン</span>
            <button class="coach-toggle" id="coach-toggle-btn">▲ 閉じる</button>
          </div>
          <div class="coach-body" id="coach-body">
            <div class="coach-loading">Geminiがプランを生成中…</div>
          </div>
        </div>
        <div class="avail-card" id="avail-card">
          <div class="avail-header" onclick="toggleAvail()">
            <span class="avail-header-title">共通の空き時間</span>
            <button class="coach-toggle" id="avail-toggle-btn">▲ 閉じる</button>
          </div>
          <div class="avail-body" id="avail-body">
            <div class="coach-loading">空き時間を計算中…</div>
          </div>
        </div>
        <div class="messages-wrap" id="messages-wrap">
          <div style="text-align:center;color:var(--muted);font-size:0.8rem;padding:1rem">読み込み中…</div>
        </div>
        <div class="input-bar">
          <input type="text" id="msg-input" placeholder="メッセージを入力…"
            onkeydown="if(event.key==='Enter')sendMsg()" />
          <button class="send-btn" id="send-btn" onclick="sendMsg()">送信</button>
        </div>`;

      history.replaceState(null, "", `/chat.html?with=${partnerId}`);

      const coachCollapsed = localStorage.getItem(`coach-collapsed-${partnerId}`) === "1";
      if (coachCollapsed) {
        document.getElementById("coach-card").classList.add("collapsed");
        document.getElementById("coach-toggle-btn").textContent = "▼ 開く";
      }
      const availCollapsed = localStorage.getItem(`avail-collapsed-${partnerId}`) === "1";
      if (availCollapsed) {
        document.getElementById("avail-card").classList.add("collapsed");
        document.getElementById("avail-toggle-btn").textContent = "▼ 開く";
      }

      if (pollTimer) clearInterval(pollTimer);
      fetchMessages();
      pollTimer = setInterval(fetchMessages, 3000);

      loadCoach(partnerId);
      loadAvailability(partnerId);
    }

    function toggleCoach() {
      const card = document.getElementById("coach-card");
      const btn = document.getElementById("coach-toggle-btn");
      if (!card) return;
      const collapsed = card.classList.toggle("collapsed");
      btn.textContent = collapsed ? "▼ 開く" : "▲ 閉じる";
      if (currentPartnerId) localStorage.setItem(`coach-collapsed-${currentPartnerId}`, collapsed ? "1" : "0");
    }

    function toggleAvail() {
      const card = document.getElementById("avail-card");
      const btn = document.getElementById("avail-toggle-btn");
      if (!card) return;
      const collapsed = card.classList.toggle("collapsed");
      btn.textContent = collapsed ? "▼ 開く" : "▲ 閉じる";
      if (currentPartnerId) localStorage.setItem(`avail-collapsed-${currentPartnerId}`, collapsed ? "1" : "0");
    }

    function useMessage(text) {
      const input = document.getElementById("msg-input");
      if (input) { input.value = text; input.focus(); }
    }

    async function loadCoach(partnerId) {
      try {
        const r = await fetch(`/api/coach/${partnerId}`, { method: "POST" });
        const data = await r.json();
        const body = document.getElementById("coach-body");
        if (!body) return;
        if (!r.ok) {
          body.innerHTML = `<div class="coach-loading" style="color:var(--danger)">${esc(data.error || "生成に失敗しました")}</div>`;
          return;
        }
        const planItems = (data.plan || []).map((p) => `<li>${esc(p)}</li>`).join("");
        const msgEscaped = esc(data.firstMessage || "");
        body.innerHTML = `
          <p class="coach-compat">${esc(data.compatibility || "")}</p>
          <div class="coach-plan">
            <div class="plan-title">おすすめのアプローチ</div>
            <ol>${planItems}</ol>
          </div>
          <div>
            <div class="plan-title">最初のメッセージ提案</div>
            <div class="suggest-bubble">"${msgEscaped}"</div>
            <button class="use-msg-btn" onclick="useMessage('${msgEscaped.replace(/'/g, "\\'")}')">このメッセージを使う ✍️</button>
          </div>`;
      } catch {
        const body = document.getElementById("coach-body");
        if (body) body.innerHTML = `<div class="coach-loading" style="color:var(--danger)">読み込みに失敗しました</div>`;
      }
    }

    async function fetchConfig() {
      try {
        const r = await fetch("/api/config");
        const d = await r.json();
        googleClientId = d.googleClientId;
      } catch {}
    }

    function connectCalendar(btnId = "cal-connect-btn") {
      if (!googleClientId || typeof google === "undefined") return;
      const tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: googleClientId,
        scope: "https://www.googleapis.com/auth/calendar.readonly",
        callback: async (tokenResponse) => {
          if (!tokenResponse.access_token) return;
          const btn = document.getElementById(btnId);
          if (btn) { btn.disabled = true; btn.textContent = "接続中…"; }
          try {
            const r = await fetch("/api/calendar/connect", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                accessToken: tokenResponse.access_token,
                timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone,
              }),
            });
            if (r.ok) {
              if (currentGroupId) loadGroupAvailability(currentGroupId);
              else if (currentPartnerId) loadAvailability(currentPartnerId);
            }
          } catch {
            if (btn) { btn.disabled = false; btn.textContent = "Googleカレンダーを連携"; }
          }
        },
      });
      tokenClient.requestAccessToken();
    }

    async function loadAvailability(partnerId) {
      try {
        const r = await fetch("/api/availability", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ targetId: partnerId }),
        });
        const data = await r.json();
        const body = document.getElementById("avail-body");
        if (!body) return;
        if (!r.ok) {
          body.innerHTML = `<div class="avail-no-data" style="color:var(--danger)">${esc(data.error || "読み込みに失敗しました")}</div>`;
          return;
        }
        if (!data.hasData) {
          body.innerHTML = `
            <div class="avail-no-data">カレンダーデータがありません。カレンダーを連携すると共通の空き時間が分かります。</div>
            <div style="margin-top:0.5rem">
              <button id="cal-connect-btn" class="cal-connect-btn" onclick="connectCalendar('cal-connect-btn')">Googleカレンダーを連携</button>
            </div>
            <div class="avail-privacy">${esc(data.privacyNote)}</div>`;
          return;
        }
        let html = "";
        if (data.bestSlot) {
          html += `<div class="best-slot">
            <span style="font-size:1.1rem">⭐</span>
            <div>
              <div class="best-slot-label">おすすめの勉強時間帯</div>
              <div class="best-slot-time">${dateLabel(data.bestSlot.day)} ${esc(data.bestSlot.start)}–${esc(data.bestSlot.end)}</div>
            </div>
          </div>`;
        }
        if (data.windows?.length) {
          html += `<div class="plan-title">共通の空き時間</div>
            <div class="avail-windows">
              ${data.windows.map((w) => `<span class="avail-chip">${dateLabel(w.day)} ${esc(w.start)}–${esc(w.end)}</span>`).join("")}
            </div>`;
        }
        if (!data.myHasData) {
          html += `<div style="margin-top:0.5rem">
            <button id="cal-connect-btn" class="cal-connect-btn" onclick="connectCalendar('cal-connect-btn')">Googleカレンダーを連携</button>
          </div>`;
        }
        html += `<div class="avail-privacy">${esc(data.privacyNote)}</div>`;
        body.innerHTML = html;
      } catch {
        const body = document.getElementById("avail-body");
        if (body) body.innerHTML = `<div class="avail-no-data" style="color:var(--danger)">読み込みに失敗しました</div>`;
      }
    }

    async function fetchMessages() {
      if (!currentPartnerId) return;
      try {
        const r = await fetch(`/api/messages/${currentPartnerId}`);
        if (!r.ok) return;
        const { messages } = await r.json();
        renderMessages(messages, false);
      } catch {}
    }

    function renderMessages(msgs, isGroup) {
      const wrap = document.getElementById("messages-wrap");
      if (!wrap) return;
      const atBottom = wrap.scrollHeight - wrap.scrollTop - wrap.clientHeight < 60;

      if (!msgs.length) {
        wrap.innerHTML = '<div style="text-align:center;color:var(--muted);font-size:0.85rem;padding:2rem">まだメッセージがありません。挨拶してみましょう！</div>';
        return;
      }

      wrap.innerHTML = msgs.map((m) => {
        const isMine = m.fromId === myId;
        const senderLine = isGroup && !isMine
          ? `<div class="bubble-sender">${esc(m.fromNickname || m.fromId)}</div>` : "";
        return `<div style="display:flex;flex-direction:column;align-items:${isMine ? "flex-end" : "flex-start"}">
          ${senderLine}
          <div class="bubble ${isMine ? "mine" : "theirs"}">${esc(m.text)}</div>
          <div class="bubble-time">${fmtTime(m.createdAt)}</div>
        </div>`;
      }).join("");

      if (atBottom) wrap.scrollTop = wrap.scrollHeight;
    }

    async function sendMsg() {
      const input = document.getElementById("msg-input");
      const btn = document.getElementById("send-btn");
      if (!input) return;
      const text = input.value.trim();
      if (!text) return;

      input.value = "";
      btn.disabled = true;
      try {
        if (currentGroupId) {
          await fetch(`/api/groups/${currentGroupId}/messages`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ text }),
          });
          await fetchGroupMessages();
        } else if (currentPartnerId) {
          await fetch(`/api/messages/${currentPartnerId}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ text }),
          });
          await fetchMessages();
        }
      } finally {
        btn.disabled = false;
        input.focus();
      }
    }

    // ── Group Chat ────────────────────────────────────────────────────────

    function openGroupChat(groupId, groupName, isMember) {
      currentGroupId = groupId;
      currentPartnerId = null;
      renderSidebar();

      const chatBody = document.getElementById("chat-body");
      chatBody.className = "";

      const group = groups.find((g) => g.id === groupId);
      const memberCount = (group?.members || []).length;
      const tags = (group?.tags || []).map((t) =>
        `<span style="background:var(--teal-50);color:var(--teal-800);padding:2px 8px;border-radius:20px;font-size:0.72rem">${esc(t)}</span>`
      ).join(" ");

      const headerHtml = `<div class="chat-header">
        <div class="contact-name">${esc(groupName)}</div>
        <div class="chat-header-sub">${memberCount}人${tags ? " · " + tags : ""}</div>
      </div>`;

      if (!isMember) {
        chatBody.innerHTML = `${headerHtml}
          <div class="messages-wrap" id="messages-wrap">
            <div style="text-align:center;color:var(--muted);font-size:0.8rem;padding:1rem">読み込み中…</div>
          </div>
          <div class="join-banner">
            <div class="join-banner-text">グループに参加するとメッセージを送れます</div>
            <button class="join-btn" onclick="joinGroup('${esc(groupId)}')">グループに参加</button>
          </div>`;
        if (pollTimer) clearInterval(pollTimer);
        fetchGroupMessages();
        pollTimer = setInterval(fetchGroupMessages, 3000);
        return;
      }

      const availCollapsed = localStorage.getItem(`grp-avail-${groupId}`) === "1";
      chatBody.innerHTML = `${headerHtml}
        <div class="avail-card${availCollapsed ? " collapsed" : ""}" id="grp-avail-card">
          <div class="avail-header" onclick="toggleGroupAvail()">
            <span class="avail-header-title">全員の空き時間</span>
            <button class="coach-toggle" id="grp-avail-btn">${availCollapsed ? "▼ 開く" : "▲ 閉じる"}</button>
          </div>
          <div class="avail-body" id="grp-avail-body">
            <div class="coach-loading">計算中…</div>
          </div>
        </div>
        <div class="messages-wrap" id="messages-wrap">
          <div style="text-align:center;color:var(--muted);font-size:0.8rem;padding:1rem">読み込み中…</div>
        </div>
        <div class="input-bar">
          <input type="text" id="msg-input" placeholder="グループにメッセージ…"
            onkeydown="if(event.key==='Enter')sendMsg()" />
          <button class="send-btn" id="send-btn" onclick="sendMsg()">送信</button>
        </div>`;

      if (pollTimer) clearInterval(pollTimer);
      fetchGroupMessages();
      pollTimer = setInterval(fetchGroupMessages, 3000);
      loadGroupAvailability(groupId);
    }

    function toggleGroupAvail() {
      const card = document.getElementById("grp-avail-card");
      const btn = document.getElementById("grp-avail-btn");
      if (!card) return;
      const collapsed = card.classList.toggle("collapsed");
      btn.textContent = collapsed ? "▼ 開く" : "▲ 閉じる";
      if (currentGroupId) localStorage.setItem(`grp-avail-${currentGroupId}`, collapsed ? "1" : "0");
    }

    async function loadGroupAvailability(groupId) {
      try {
        const r = await fetch(`/api/groups/${groupId}/availability`, { method: "POST" });
        const data = await r.json();
        const body = document.getElementById("grp-avail-body");
        if (!body) return;

        if (!r.ok) {
          body.innerHTML = `<div class="avail-no-data" style="color:var(--danger)">${esc(data.error || "読み込みに失敗しました")}</div>`;
          return;
        }

        if (!data.hasData) {
          body.innerHTML = `
            <div class="avail-no-data">カレンダーを連携しているメンバーが少なすぎます（${data.membersWithCalendar}/${data.memberCount}人が連携済み）。あなたのカレンダーを連携して共通の空き時間を計算しましょう。</div>
            <div style="margin-top:0.6rem">
              <button id="grp-cal-btn" class="cal-connect-btn" onclick="connectCalendar('grp-cal-btn')">Googleカレンダーを連携</button>
            </div>
            <div class="avail-privacy">${esc(data.privacyNote)}</div>`;
          return;
        }

        let html = "";
        if (data.bestSlot) {
          html += `<div class="best-slot">
            <span style="font-size:1.1rem">⭐</span>
            <div>
              <div class="best-slot-label">おすすめ（${data.membersWithCalendar}/${data.memberCount}人参照）</div>
              <div class="best-slot-time">${dateLabel(data.bestSlot.day)} ${esc(data.bestSlot.start)}–${esc(data.bestSlot.end)}</div>
            </div>
          </div>`;
        }
        if (data.windows?.length) {
          html += `<div class="plan-title">全員が空いている時間帯</div>
            <div class="avail-windows">
              ${data.windows.map((w) => `<span class="avail-chip">${dateLabel(w.day)} ${esc(w.start)}–${esc(w.end)}</span>`).join("")}
            </div>`;
        }
        if (data.aiSuggestion) {
          html += `<div style="font-size:0.82rem;color:var(--teal-800);background:var(--teal-50);border-left:3px solid var(--teal);border-radius:0 var(--r-sm) var(--r-sm) 0;padding:0.6rem 0.9rem;margin-top:0.6rem;line-height:1.6"><strong>Gemini </strong> ${esc(data.aiSuggestion)}</div>`;
        }
        if (data.membersWithCalendar < data.memberCount) {
          html += `<div style="margin-top:0.6rem">
            <button id="grp-cal-btn" class="cal-connect-btn" onclick="connectCalendar('grp-cal-btn')">Googleカレンダーを連携</button>
          </div>`;
        }
        html += `<div class="avail-privacy">${esc(data.privacyNote)}</div>`;
        body.innerHTML = html;
      } catch {
        const body = document.getElementById("grp-avail-body");
        if (body) body.innerHTML = `<div class="avail-no-data" style="color:var(--danger)">読み込みに失敗しました</div>`;
      }
    }

    async function fetchGroupMessages() {
      if (!currentGroupId) return;
      try {
        const r = await fetch(`/api/groups/${currentGroupId}/messages`);
        if (!r.ok) return;
        const { messages } = await r.json();
        renderMessages(messages, true);
      } catch {}
    }

    async function joinGroup(groupId) {
      try {
        const r = await fetch(`/api/groups/${groupId}/join`, { method: "POST" });
        if (!r.ok) throw new Error((await r.json()).error || "参加に失敗しました");
        memberGroups.add(groupId);
        await loadGroupsData();
        const group = groups.find((g) => g.id === groupId);
        openGroupChat(groupId, group?.name || groupId, true);
        renderSidebar();
      } catch (e) { alert(e.message); }
    }

    // ── Init ──────────────────────────────────────────────────────────────

    (async () => {
      try {
        const meRes = await fetch("/api/me");
        if (!meRes.ok) { location.href = "/"; return; }
        const { user } = await meRes.json();
        myId = user.id;

        await Promise.all([fetchConfig(), loadSidebarData(), loadGroupsData()]);

        const params = new URLSearchParams(location.search);
        const withId = params.get("with");
        if (withId) {
          const conn = connections.find((c) => c.partnerId === withId);
          if (conn) openChat(conn.partnerId, conn.nickname);
        }
      } catch {
        location.href = "/";
      }
    })();
  </script>
</body>
</html>
